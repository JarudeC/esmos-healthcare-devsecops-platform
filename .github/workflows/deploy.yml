name: "Terraform Deploy Pipeline"

on:
  pull_request:
    branches: [main]
    paths:
      - terraform/**
      - kubernetes/**
      - .github/workflows/deploy.yml
  push:
    branches: [main]
    paths:
      - terraform/**
      - kubernetes/**
      - .github/workflows/deploy.yml
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write   # Workload Identity Federation
  contents: read
  pull-requests: write

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}

jobs:
  # ───────────────────────────────────────────────
  # RFC Phase: Plan on every Pull Request
  # ───────────────────────────────────────────────
  terraform-plan:
    name: "Terraform Plan (RFC)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: terraform plan -out=tfplan -no-color
        continue-on-error: false

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout || 'See workflow logs for plan output.' }}
            \`\`\`
            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # ───────────────────────────────────────────────
  # Deploy Phase: Apply on merge to main
  # ───────────────────────────────────────────────
  terraform-apply:
    name: "Terraform Apply (Deploy)"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud + kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin,kubectl"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials esmos-healthcare-gke \
            --zone asia-southeast1-a \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Create osTicket SMTP secret
        run: |
          kubectl create namespace osticket --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic osticket-smtp -n osticket \
            --from-literal=from="${{ secrets.SMTP_FROM }}" \
            --from-literal=username="${{ secrets.SMTP_USER }}" \
            --from-literal=password="${{ secrets.SMTP_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Odoo SMTP secret
        run: |
          kubectl create namespace odoo --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic odoo-smtp -n odoo \
            --from-literal=from="${{ secrets.SMTP_FROM }}" \
            --from-literal=username="${{ secrets.SMTP_USER }}" \
            --from-literal=password="${{ secrets.SMTP_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Moodle MariaDB secret
        run: |
          kubectl create namespace moodle --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic moodle-mariadb -n moodle \
            --from-literal=mariadb-password="${{ secrets.MOODLE_MARIADB_PASSWORD }}" \
            --from-literal=mariadb-root-password="${{ secrets.MOODLE_MARIADB_ROOT_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

  # ───────────────────────────────────────────────
  # Destroy Phase: Manual trigger only
  # ───────────────────────────────────────────────
  terraform-destroy:
    name: "Terraform Destroy (Teardown)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud + kubectl
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: "gke-gcloud-auth-plugin,kubectl"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -auto-approve
