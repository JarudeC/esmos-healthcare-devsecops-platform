apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: moodle
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - chart: moodle
      repoURL: registry-1.docker.io/bitnamicharts
      targetRevision: "23.0.0"
      helm:
        valueFiles:
          - $values/kubernetes/moodle/values.yaml
    - repoURL: https://github.com/JarudeC/esmos-healthcare-devsecops-platform.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: moodle

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
