apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: moodle-data
  namespace: moodle
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: moodle
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: moodle
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: moodle-mariadb
                  key: mariadb-root-password
            - name: MARIADB_DATABASE
              value: "moodle"
            - name: MARIADB_USER
              value: "moodle"
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: moodle-mariadb
                  key: mariadb-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: moodle
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
  namespace: moodle
  labels:
    app: moodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
        - name: moodle
          image: moodlehq/moodle-php-apache:8.3
          ports:
            - containerPort: 80
          env:
            - name: MOODLE_DOCKER_DBTYPE
              value: "mariadb"
            - name: MOODLE_DOCKER_DBHOST
              value: "mariadb"
            - name: MOODLE_DOCKER_DBNAME
              value: "moodle"
            - name: MOODLE_DOCKER_DBUSER
              value: "root"
            - name: MOODLE_DOCKER_DBPASS
              valueFrom:
                secretKeyRef:
                  name: moodle-mariadb
                  key: mariadb-root-password
            - name: APACHE_DOCUMENT_ROOT
              value: "/var/www/html"
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update && apt-get install -y git
              cd /var/www/html
              if [ ! -f config.php ]; then
                git clone --depth 1 --branch MOODLE_405_STABLE https://github.com/moodle/moodle.git .
                mkdir -p /var/www/moodledata
                chmod 777 /var/www/moodledata
                php admin/cli/install.php \
                  --wwwroot=http://localhost:8080 \
                  --dataroot=/var/www/moodledata \
                  --dbtype=mariadb \
                  --dbhost=mariadb \
                  --dbname=moodle \
                  --dbuser=root \
                  --dbpass="$MOODLE_DOCKER_DBPASS" \
                  --fullname="ESMOS Healthcare Training" \
                  --shortname="ESMOS" \
                  --adminuser=admin \
                  --adminpass=esmos-admin \
                  --adminemail=admin@esmos.local \
                  --non-interactive \
                  --agree-license
                echo "\$CFG->sslproxy = false;" >> /var/www/html/config.php
                sed -i "s|'wwwroot'.*|'wwwroot'   => 'http://localhost:8080',|" /var/www/html/config.php
              fi
              chown -R www-data:www-data /var/www/html /var/www/moodledata
              apache2ctl -D FOREGROUND
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 60
            periodSeconds: 30
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 10
      volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: moodle
  namespace: moodle
spec:
  type: ClusterIP
  selector:
    app: moodle
  ports:
    - port: 8080
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moodle-hpa
  namespace: moodle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moodle
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
