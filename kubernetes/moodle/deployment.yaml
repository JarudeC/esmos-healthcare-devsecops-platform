apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: moodle-data
  namespace: moodle
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-data
  namespace: moodle
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: moodle
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: "esmos-mariadb-root"
            - name: MARIADB_DATABASE
              value: "moodle"
            - name: MARIADB_USER
              value: "moodle"
            - name: MARIADB_PASSWORD
              value: "esmos-moodle-db"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: moodle
spec:
  type: ClusterIP
  selector:
    app: mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodle
  namespace: moodle
  labels:
    app: moodle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodle
  template:
    metadata:
      labels:
        app: moodle
    spec:
      containers:
        - name: moodle
          image: moodlehq/moodle-php-apache:8.3
          ports:
            - containerPort: 80
          env:
            - name: MOODLE_DOCKER_DBTYPE
              value: "mariadb"
            - name: MOODLE_DOCKER_DBHOST
              value: "mariadb"
            - name: MOODLE_DOCKER_DBNAME
              value: "moodle"
            - name: MOODLE_DOCKER_DBUSER
              value: "moodle"
            - name: MOODLE_DOCKER_DBPASS
              value: "esmos-moodle-db"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: moodle-data
              mountPath: /var/www/moodledata
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: moodle-data
          persistentVolumeClaim:
            claimName: moodle-data
---
apiVersion: v1
kind: Service
metadata:
  name: moodle
  namespace: moodle
spec:
  type: ClusterIP
  selector:
    app: moodle
  ports:
    - port: 8080
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moodle-hpa
  namespace: moodle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moodle
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
