apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: odoo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - chart: odoo
      repoURL: oci://registry-1.docker.io/bitnamicharts
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/kubernetes/odoo/values.yaml
    - repoURL: https://github.com/JarudeC/esmos-healthcare-devsecops-platform.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: odoo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
