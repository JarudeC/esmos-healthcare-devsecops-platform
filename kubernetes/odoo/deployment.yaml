apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo-data
  namespace: odoo
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: odoo-addons
  namespace: odoo
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: odoo
  labels:
    app: odoo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: odoo
  template:
    metadata:
      labels:
        app: odoo
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: odoo
          image: odoo:17.0
          args:
            - "--email-from=$(SMTP_FROM)"
            - "--smtp=smtp.office365.com"
            - "--smtp-port=587"
            - "--smtp-ssl"
            - "--smtp-user=$(SMTP_USER)"
            - "--smtp-password=$(SMTP_PASSWORD)"
          ports:
            - containerPort: 8069
          env:
            - name: HOST
              value: "172.22.0.5"  # Cloud SQL private IP
            - name: PORT
              value: "5432"
            - name: USER
              value: "odooadmin"
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: password
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: odoo-smtp
                  key: from
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: odoo-smtp
                  key: username
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-smtp
                  key: password
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
            - name: odoo-addons
              mountPath: /mnt/extra-addons
          livenessProbe:
            tcpSocket:
              port: 8069
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8069
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-data
        - name: odoo-addons
          persistentVolumeClaim:
            claimName: odoo-addons
---
apiVersion: v1
kind: Service
metadata:
  name: odoo
  namespace: odoo
spec:
  type: ClusterIP
  selector:
    app: odoo
  ports:
    - port: 8069
      targetPort: 8069
