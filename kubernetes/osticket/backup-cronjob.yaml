apiVersion: batch/v1
kind: CronJob
metadata:
  name: osticket-mariadb-backup
  namespace: osticket
spec:
  schedule: "0 3 * * *"  # Daily at 3am SGT (staggered from Moodle at 2am)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: google/cloud-sdk:slim
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update && apt-get install -y mariadb-client
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_FILE="/tmp/osticket-backup-${TIMESTAMP}.sql"
                  echo "Starting osTicket MariaDB backup..."
                  mysqldump -h osticket-mariadb -u root -p"esmos-osticket-root" osticket > "$BACKUP_FILE"
                  gcloud storage cp "$BACKUP_FILE" "gs://esmos-healthcare-tfstate/osticket-backups/osticket-backup-${TIMESTAMP}.sql"
                  echo "Backup uploaded to gs://esmos-healthcare-tfstate/osticket-backups/"
                  # Clean up backups older than 7 days
                  gcloud storage ls "gs://esmos-healthcare-tfstate/osticket-backups/" | while read -r file; do
                    FILE_DATE=$(echo "$file" | grep -oP '\d{8}')
                    if [ -n "$FILE_DATE" ]; then
                      CUTOFF=$(date -d "7 days ago" +%Y%m%d)
                      if [ "$FILE_DATE" -lt "$CUTOFF" ] 2>/dev/null; then
                        gcloud storage rm "$file"
                      fi
                    fi
                  done
          restartPolicy: OnFailure
