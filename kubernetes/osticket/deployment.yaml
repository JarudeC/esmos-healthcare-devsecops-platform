apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: osticket-data
  namespace: osticket
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osticket
  namespace: osticket
  labels:
    app: osticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osticket
  template:
    metadata:
      labels:
        app: osticket
    spec:
      containers:
        - name: osticket
          image: osticket/osticket:latest
          ports:
            - containerPort: 80
          env:
            - name: MYSQL_HOST
              value: "osticket-mariadb"
            - name: MYSQL_DATABASE
              value: "osticket"
            - name: MYSQL_USER
              value: "osticket"
            - name: MYSQL_PASSWORD
              value: "esmos-osticket-db"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: osticket-data
              mountPath: /var/www/html/include/ost-config.php
              subPath: ost-config.php
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 80
            periodSeconds: 10
      volumes:
        - name: osticket-data
          persistentVolumeClaim:
            claimName: osticket-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: osticket-mariadb-data
  namespace: osticket
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osticket-mariadb
  namespace: osticket
  labels:
    app: osticket-mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osticket-mariadb
  template:
    metadata:
      labels:
        app: osticket-mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.4
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: "esmos-osticket-root"
            - name: MARIADB_DATABASE
              value: "osticket"
            - name: MARIADB_USER
              value: "osticket"
            - name: MARIADB_PASSWORD
              value: "esmos-osticket-db"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: osticket-mariadb-data
---
apiVersion: v1
kind: Service
metadata:
  name: osticket-mariadb
  namespace: osticket
spec:
  type: ClusterIP
  selector:
    app: osticket-mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: osticket
  namespace: osticket
spec:
  type: ClusterIP
  selector:
    app: osticket
  ports:
    - port: 8888
      targetPort: 80
